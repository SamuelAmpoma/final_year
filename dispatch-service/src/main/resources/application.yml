server:
  port: 8083

spring:
  application:
    name: dispatch-service
  datasource:
    url: jdbc:postgresql://localhost:5432/dispatch_service_db
    username: postgres
    password: sasu1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: emergency-response-platform-secret-key-2024-very-long-and-secure-key-minimum-256-bits

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.emergency.dispatch: DEBUG
